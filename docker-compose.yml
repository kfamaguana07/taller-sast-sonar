version: '3.8'
services:
  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:17-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: product_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./apps/auth-service     # ← ruta actualizada
    container_name: auth-service
    ports:
      - "3000:3000"
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: auth_service
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
      JWT_EXPIRATION: 10m
      REFRESH_EXPIRATION: 7d
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always

  product-service:
    build: ./apps/products
    container_name: product-service
    ports:
      - "3001:3000"
    environment:
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: product_service
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
    depends_on:
      product-db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./apps/frontend          # ← ruta actualizada
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - product-service

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devsecops

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-extensions:/opt/sonarqube/extensions
      - sonar-logs:/opt/sonarqube/logs
    networks:
      - devsecops

  github-runner:
    image: myoung34/github-runner:ubuntu-jammy
    container_name: github-runner
    restart: unless-stopped
    depends_on:
      - sonarqube
    environment:
      REPO_URL: ${REPO_URL}
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_NAME: docker-runner
      RUNNER_WORKDIR: /tmp/github-runner
      LABELS: self-hosted,docker
      RUN_AS_ROOT: "true"
    volumes:
      - runner_data:/tmp/github-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops

volumes:
  auth-db-data:
  product-db-data:
  sonar-db-data:
  sonar-data:
  sonar-extensions:
  sonar-logs:
  runner_data:

networks:
  devsecops:
    driver: bridge